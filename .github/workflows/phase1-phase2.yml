name: 🔥 Phase 1 & 2 - MANUAL TRIGGER (Instant + 1 Hour)

on:
  workflow_dispatch:
    inputs:
      instagram_link:
        description: 'Paste Instagram link here'
        required: true
        default: 'https://www.instagram.com/'

jobs:
  phase1-instant:
    runs-on: ubuntu-latest
    outputs:
      api_response_1: ${{ steps.api_call_1.outputs.response }}
      api_response_2: ${{ steps.api_call_2.outputs.response }}
    
    steps:
      - name: 📝 Log Input
        run: |
          echo "Instagram Link: ${{ github.event.inputs.instagram_link }}"
          echo "INSTAGRAM_LINK=${{ github.event.inputs.instagram_link }}" >> $GITHUB_ENV
      
      - name: 📡 API Call 1 - Service 711 (Quantity: 3000)
        id: api_call_1
        run: |
          RESPONSE=$(curl -s -X POST "https://primesmm.com/api/v2" \
            -H "Content-Type: application/json" \
            -d '{
              "key": "${{ secrets.PRIMESMM_API_KEY }}",
              "action": "add",
              "service": "711",
              "link": "${{ github.event.inputs.instagram_link }}",
              "quantity": "3000"
            }')
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT
          echo "API_1_RESPONSE=$RESPONSE" >> $GITHUB_ENV
        continue-on-error: true

      - name: 📡 API Call 2 - Service 1150 (Quantity: 100)
        id: api_call_2
        run: |
          RESPONSE=$(curl -s -X POST "https://primesmm.com/api/v2" \
            -H "Content-Type: application/json" \
            -d '{
              "key": "${{ secrets.PRIMESMM_API_KEY }}",
              "action": "add",
              "service": "1150",
              "link": "${{ github.event.inputs.instagram_link }}",
              "quantity": "100"
            }')
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT
          echo "API_2_RESPONSE=$RESPONSE" >> $GITHUB_ENV
        continue-on-error: true

      - name: ✅ Phase 1 Complete - Send Email
        if: always()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: '✅ Phase 1 Complete - API Calls 1 & 2 Done'
          to: ${{ secrets.NOTIFY_EMAIL }}
          html_body: |
            <h2>✅ Phase 1 - INSTANT API CALLS COMPLETE</h2>
            <hr>
            <p><strong>Time:</strong> $(date '+%Y-%m-%d %H:%M:%S')</p>
            <p><strong>Instagram Link:</strong> ${{ github.event.inputs.instagram_link }}</p>
            <hr>
            <h3>📊 API Call 1 - Service 711 (Quantity: 3000)</h3>
            <pre><code>${{ env.API_1_RESPONSE }}</code></pre>
            <hr>
            <h3>📊 API Call 2 - Service 1150 (Quantity: 100)</h3>
            <pre><code>${{ env.API_2_RESPONSE }}</code></pre>
            <hr>
            <p><strong>⏳ Next Step:</strong> Phase 2 will run in 1 hour automatically</p>
            <p><strong>📧 You'll receive another email when Phase 2 completes</strong></p>
        continue-on-error: true

  phase2-delayed:
    needs: phase1-instant
    runs-on: ubuntu-latest
    
    steps:
      - name: ⏳ Wait 1 Hour
        run: sleep 3600

      - name: 📡 API Call 3 - Service 711 (Quantity: 8500)
        id: api_call_3
        run: |
          RESPONSE=$(curl -s -X POST "https://primesmm.com/api/v2" \
            -H "Content-Type: application/json" \
            -d '{
              "key": "${{ secrets.PRIMESMM_API_KEY }}",
              "action": "add",
              "service": "711",
              "link": "${{ github.event.inputs.instagram_link }}",
              "quantity": "8500"
            }')
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT
          echo "API_3_RESPONSE=$RESPONSE" >> $GITHUB_ENV
        continue-on-error: true

      - name: ✅ Phase 2 Complete - Send Email
        if: always()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: '✅ Phase 2 Complete - API Call 3 Done (1 Hour Later)'
          to: ${{ secrets.NOTIFY_EMAIL }}
          html_body: |
            <h2>✅ Phase 2 - DELAYED API CALL COMPLETE</h2>
            <hr>
            <p><strong>Time:</strong> $(date '+%Y-%m-%d %H:%M:%S')</p>
            <p><strong>Delay:</strong> 1 hour after Phase 1</p>
            <p><strong>Instagram Link:</strong> ${{ github.event.inputs.instagram_link }}</p>
            <hr>
            <h3>📊 API Call 3 - Service 711 (Quantity: 8500)</h3>
            <pre><code>${{ env.API_3_RESPONSE }}</code></pre>
            <hr>
            <p><strong>⏰ Next:</strong> Phase 3 will run automatically at 1:30 AM IST today</p>
            <p><strong>📧 You'll receive another email when Phase 3 completes</strong></p>
        continue-on-error: true
