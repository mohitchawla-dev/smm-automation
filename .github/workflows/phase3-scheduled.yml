name: 💬 Phase 3 - SCHEDULED (1:30 AM IST with Comments)

on:
  schedule:
    - cron: '0 20 * * *'  # 1:30 AM IST (20:00 UTC) every day
  workflow_dispatch:

jobs:
  phase3-scheduled:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📂 Checkout repo
        uses: actions/checkout@v4

      - name: 📖 Read Instagram Link from File
        id: read_link
        run: |
          if [ -f instagram_link.txt ]; then
            LINK=$(cat instagram_link.txt | tr -d '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            echo "INSTAGRAM_LINK=$LINK" >> $GITHUB_ENV
          else
            echo "INSTAGRAM_LINK=${{ secrets.DEFAULT_INSTAGRAM_LINK }}" >> $GITHUB_ENV
          fi
          echo "Using link: ${{ env.INSTAGRAM_LINK }}"

      - name: 📝 Build Comments (20 copies of link)
        id: build_comments
        run: |
          LINK="${{ env.INSTAGRAM_LINK }}"
          COMMENTS=""
          for i in {1..20}; do
            COMMENTS="${COMMENTS}${LINK}"
            if [ $i -lt 20 ]; then
              COMMENTS="${COMMENTS}\n"
            fi
          done
          echo "COMMENTS=$COMMENTS" >> $GITHUB_ENV

      - name: 📡 API Call 4 - Service 1166 (Quantity: 18000)
        id: api_call_4
        run: |
          RESPONSE=$(curl -s -X POST "https://primesmm.com/api/v2" \
            -H "Content-Type: application/json" \
            -d '{
              "key": "${{ secrets.PRIMESMM_API_KEY }}",
              "action": "add",
              "service": "1166",
              "link": "${{ env.INSTAGRAM_LINK }}",
              "quantity": "18000"
            }')
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT
          echo "API_4_RESPONSE=$RESPONSE" >> $GITHUB_ENV
        continue-on-error: true

      - name: 📡 API Call 5 - Service 1150 (Quantity: 350)
        id: api_call_5
        run: |
          RESPONSE=$(curl -s -X POST "https://primesmm.com/api/v2" \
            -H "Content-Type: application/json" \
            -d '{
              "key": "${{ secrets.PRIMESMM_API_KEY }}",
              "action": "add",
              "service": "1150",
              "link": "${{ env.INSTAGRAM_LINK }}",
              "quantity": "350"
            }')
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT
          echo "API_5_RESPONSE=$RESPONSE" >> $GITHUB_ENV
        continue-on-error: true

      - name: 📡 API Call 6 - Service 1143 (20 Comments = Link)
        id: api_call_6
        run: |
          RESPONSE=$(curl -s -X POST "https://primesmm.com/api/v2" \
            -H "Content-Type: application/json" \
            -d '{
              "key": "${{ secrets.PRIMESMM_API_KEY }}",
              "action": "add",
              "service": "1143",
              "link": "${{ env.INSTAGRAM_LINK }}",
              "comments": "${{ env.COMMENTS }}"
            }')
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT
          echo "API_6_RESPONSE=$RESPONSE" >> $GITHUB_ENV
        continue-on-error: true

      - name: ✅ Phase 3 Complete - Send Email
        if: always()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: '✅ Phase 3 Complete - 1:30 AM IST API Calls (4, 5, 6)'
          to: ${{ secrets.NOTIFY_EMAIL }}
          html_body: |
            <h2>✅ Phase 3 - SCHEDULED API CALLS COMPLETE (1:30 AM IST)</h2>
            <hr>
            <p><strong>Time:</strong> $(date '+%Y-%m-%d %H:%M:%S IST')</p>
            <p><strong>Instagram Link:</strong> ${{ env.INSTAGRAM_LINK }}</p>
            <hr>
            <h3>📊 API Call 4 - Service 1166 (Quantity: 18000)</h3>
            <pre><code>${{ env.API_4_RESPONSE }}</code></pre>
            <hr>
            <h3>📊 API Call 5 - Service 1150 (Quantity: 350)</h3>
            <pre><code>${{ env.API_5_RESPONSE }}</code></pre>
            <hr>
            <h3>📊 API Call 6 - Service 1143 (20 Comments = Link)</h3>
            <pre><code>${{ env.API_6_RESPONSE }}</code></pre>
            <hr>
            <p><strong>✨ All 6 API calls completed successfully!</strong></p>
            <p><strong>Summary:</strong> 3 Phases × 2 Manual + 1 Scheduled = Complete Automation</p>
        continue-on-error: true
