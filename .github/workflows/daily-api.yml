name: 🤖 Daily Instagram Followers - FollowersMeta

on:
  schedule:
    - cron: '30 21 * * *'  # 3:00 AM IST daily
  workflow_dispatch:

jobs:
  run-api:
    runs-on: ubuntu-latest

    steps:
      - name: 🔑 Check API Key
        env:
          API_KEY: ${{ secrets.FOLLOWERSMETA_API_KEY }}
        run: |
          echo "Key length: ${#API_KEY}"
          if [ -z "$API_KEY" ]; then
            echo "ERROR: API key is empty!"
            exit 1
          else
            echo "API key is set (first 4 chars: ${API_KEY:0:4}...)"
          fi

      - name: 💰 Check Balance
        id: balance
        env:
          API_KEY: ${{ secrets.FOLLOWERSMETA_API_KEY }}
        run: |
          BALANCE=$(curl -sS -X POST "https://followersmeta.com/api/v2" \
            -d "key=$API_KEY&action=balance" 2>&1)
          echo "Balance response: $BALANCE"

      - name: 📡 Place Order
        id: api_call
        env:
          API_KEY: ${{ secrets.FOLLOWERSMETA_API_KEY }}
        run: |
          RESPONSE=$(curl -sS -X POST "https://followersmeta.com/api/v2" \
            -d "key=$API_KEY" \
            -d "action=add" \
            -d "service=2" \
            -d "quantity=400" \
            --data-urlencode "link=https://www.instagram.com/mht.chawla/" 2>&1)

          echo "Order response: $RESPONSE"

          if [ -z "$RESPONSE" ]; then
            STATUS="❌ FAILED — Empty response"
          elif echo "$RESPONSE" | jq -e '.order' >/dev/null 2>&1; then
            ORDER_ID=$(echo "$RESPONSE" | jq -r '.order')
            STATUS="✅ SUCCESS — Order ID: $ORDER_ID"
          else
            ERROR=$(echo "$RESPONSE" | jq -r '.error // "Unknown error"' 2>/dev/null || echo "$RESPONSE")
            STATUS="❌ FAILED — $ERROR"
          fi

          {
            echo "RESPONSE<<EOF"
            echo "$RESPONSE"
            echo "EOF"
            echo "TIMESTAMP=$(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M:%S IST')"
            echo "STATUS=$STATUS"
          } >> "$GITHUB_ENV"
        continue-on-error: true

      - name: 📧 Send Email Notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: 'FollowersMeta Daily — ${{ env.STATUS }} — ${{ env.TIMESTAMP }}'
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: 'GitHub Actions <noreply@github.com>'
          body: |
            🤖 FollowersMeta Daily API Report
            ══════════════════════════════════

            ⏰ Time:    ${{ env.TIMESTAMP }}
            📊 Status:  ${{ env.STATUS }}

            📝 Raw API Response:
            ${{ env.RESPONSE }}

            ──────────────────────────────────
            Service: 2 | Quantity: 400
            Link: https://www.instagram.com/mht.chawla/
